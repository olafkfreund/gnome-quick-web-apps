# Flatpak manifest for the GNOME Quick Web Apps manager.
#
# NOTE: This builds the GTK4 manager only. The CEF runner (#8) is added once
# the Chromium build sources are vendored. A fully offline build also needs a
# generated `cargo-sources.json` (via flatpak-builder-tools'
# flatpak-cargo-generator.py) referenced under the build module's `sources`.
#
# Build:
#   flatpak install -y flathub org.gnome.Platform//47 org.gnome.Sdk//47 \
#     org.freedesktop.Sdk.Extension.rust-stable//24.08
#   flatpak-builder --user --install --force-clean build \
#     build-aux/flatpak/io.github.olafkfreund.QuickWebApps.yml

app-id: io.github.olafkfreund.QuickWebApps
runtime: org.gnome.Platform
runtime-version: "47"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: gnome-quick-web-apps

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --share=network
  # DynamicLauncher portal access for installing .desktop launchers
  - --talk-name=org.freedesktop.portal.DynamicLauncher

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/quick-web-apps/cargo

modules:
  - name: quick-web-apps
    buildsystem: simple
    build-commands:
      - cargo build --release --offline -p gnome-quick-web-apps
      - install -Dm755 target/release/gnome-quick-web-apps /app/bin/gnome-quick-web-apps
      - install -Dm644 data/io.github.olafkfreund.QuickWebApps.desktop
        /app/share/applications/io.github.olafkfreund.QuickWebApps.desktop
      - install -Dm644 data/io.github.olafkfreund.QuickWebApps.metainfo.xml
        /app/share/metainfo/io.github.olafkfreund.QuickWebApps.metainfo.xml
      - install -Dm644 data/icons/hicolor/scalable/apps/io.github.olafkfreund.QuickWebApps.svg
        /app/share/icons/hicolor/scalable/apps/io.github.olafkfreund.QuickWebApps.svg
    sources:
      - type: dir
        path: ../..
      # - cargo-sources.json   # generated; required for --offline
